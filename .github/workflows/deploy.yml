name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    steps:
      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd ~/carylcomedy

            # Pull latest code
            git pull origin main

            # Activate cPanel's Node.js virtual environment
            source ~/nodevenv/carylcomedy/22/bin/activate

            # CloudLinux's npm wrapper silently redirects every install to the
            # wrong package.json regardless of cwd — bypass it, call real npm
            unset npm_config_prefix
            unset NPM_CONFIG_PREFIX
            REAL_NPM=/opt/alt/alt-nodejs22/root/usr/bin/npm

            cd server && $REAL_NPM install && cd ..
            cd client && $REAL_NPM install && cd ..

            # Rebuild the React frontend
            $REAL_NPM run build

            # Restart via Passenger's file-watch (this hosting has no pm2)
            mkdir -p tmp
            touch tmp/restart.txt
